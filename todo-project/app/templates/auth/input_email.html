{% extends "base.html" %}

{% block title %}Email{% endblock %}

{% block body %}
  <h1>メールアドレスの入力</h1>
    <form method="POST" action="{{ url_for('auth.input_email') }}">
    {{ form.hidden_tag() }}
    <p>
      {{ form.email.label }}<br>
      {{ form.email(size=32) }}<br>
      {% for error in form.email.errors %}
          <span style="color: red;">[{{ error }}]</span>
      {% endfor %}
    </p>
    <p>{{ form.submit() }}</p>
  </form>

  <p><a href="{{ url_for('auth.login') }}">ログイン画面へ戻る</a></p>
{% endblock %}
