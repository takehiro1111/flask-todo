services:
  mysql:
    image: mysql:9.7@sha256:ad88e1c86cbf12ef52d0a0360cd4b774d22956c5ee9c565645fb019d7aacb6c3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fk_todos
    ports:
      - 3306:3306
    volumes:
      - mysql-data2:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    platform: linux/amd64 # 使用時の環境によって適宜変更する必要がある。
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql-data2:
