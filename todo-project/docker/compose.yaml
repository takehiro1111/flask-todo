services:
  mysql:
    image: mysql:8.4@sha256:d2c60b1b225c6d7845f0abdb596fc35c2d4122bcad6ec219588035a118f75d93
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fk_todos
    ports:
      - 3306:3306
    volumes:
      - mysql-data2:/var/lib/mysql

  mailhog:
    image: mailhog/mailhog
    platform: linux/amd64 # 使用時の環境によって適宜変更する必要がある。
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql-data2:
